<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="ec-api-base" content="https://ec-routine-api.onrender.com/api" />
    <script src="api-base.js?v=20260419deploy"></script>
    <script src="auth-guard.js?v=20260418guard"></script>
    <title>EC ROUTINE — Admin</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' fill='%231a1a2e' rx='4'/><text x='16' y='22' font-family='sans-serif' font-size='14' fill='%23eee' text-anchor='middle'>EC</text></svg>" type="image/svg+xml">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="admin.css?v=20260420admin">
</head>
<body class="admin-page">
    <div class="admin-wrap">
        <header class="admin-header">
            <h1 class="admin-title">Painel admin</h1>
            <span class="admin-meta" id="adminGeneratedAt" aria-live="polite"></span>
        </header>
        <div class="admin-actions">
            <a class="admin-btn" href="dashboard.html?view=cards">Voltar ao dashboard</a>
            <button type="button" class="admin-btn admin-btn--primary" id="adminBtnRefresh">Atualizar</button>
        </div>
        <div id="adminError" class="admin-msg admin-msg--error hidden" role="alert"></div>
        <p id="adminDeniedHint" class="admin-msg admin-msg--hint hidden">
            O seu e-mail de sessão não está na variável <strong>ADMIN_EMAILS</strong> do servidor (Render / .env).
            Não commite e-mails reais no repositório; configure só no painel do host.
        </p>
        <div id="adminStats" class="admin-grid hidden" aria-live="polite">
            <div class="admin-stat">
                <div class="admin-stat__value" id="statUsers">—</div>
                <div class="admin-stat__label">Utilizadores</div>
            </div>
            <div class="admin-stat">
                <div class="admin-stat__value" id="statRoutines">—</div>
                <div class="admin-stat__label">Rotinas</div>
            </div>
            <div class="admin-stat">
                <div class="admin-stat__value" id="statUsers7d">—</div>
                <div class="admin-stat__label">Novos (7 dias)</div>
            </div>
            <div class="admin-stat">
                <div class="admin-stat__value" id="statRoutines7d">—</div>
                <div class="admin-stat__label">Rotinas act. (7 dias)</div>
            </div>
            <div class="admin-stat">
                <div class="admin-stat__value" id="statAttachments">—</div>
                <div class="admin-stat__label">Anexos</div>
            </div>
        </div>
    </div>
    <script src="admin.js?v=20260420admin"></script>
</body>
</html>
